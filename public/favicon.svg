<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Outer Canvas Grid Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <g filter="url(#shadow)" transform="translate(0, 0)">
    <!-- WIFI Waves (representing VIP WIFI) -->
    <path d="M256,380 A36,36 0 1,1 255.99,380 Z" fill="url(#goldGrad)" style="transform-origin: 256px 380px;" />
    
    <path d="M190,314 A96,96 0 0,1 322,314" fill="none" stroke="url(#goldGrad)" stroke-width="16" stroke-linecap="round" />
    <path d="M140,264 A164,164 0 0,1 372,264" fill="none" stroke="url(#goldGrad)" stroke-width="18" stroke-linecap="round" />
    <path d="M90,214 A234,234 0 0,1 422,214" fill="none" stroke="url(#goldGrad)" stroke-width="20" stroke-linecap="round" />
    
    <!-- VIP Floating Badge -->
    <rect x="186" y="396" width="140" height="42" rx="12" fill="#ffffff" />
    <text x="256" y="426" font-family="'Cairo', sans-serif, Arial" font-size="24" font-weight="900" fill="#1e1b4b" text-anchor="middle" letter-spacing="2">VIP</text>
    
    <!-- Card Frame (The Billing / Cards Ledger badge) -->
    <rect x="156" y="100" width="200" height="120" rx="20" fill="none" stroke="#ffffff" stroke-width="12" stroke-dasharray="14 12" opacity="0.85" />
    
    <text x="256" y="174" font-family="'Cairo', sans-serif, Arial" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle">CASH</text>
  </g>
</svg>
